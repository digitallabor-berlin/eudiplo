name: Load Tests

on:
  # Manual trigger — choose a specific scenario and profile
  workflow_dispatch:
    inputs:
      scenario:
        description: Scenario to run (or "all")
        required: false
        default: all
        type: choice
        options:
          - all
          - api-auth
          - pre-auth-issuance
          - oid4vp-presentation
          - status-list
      profile:
        description: Load profile
        required: false
        default: smoke
        type: choice
        options:
          - smoke
          - load
          - stress
          - spike

  # Scheduled weekly regression — run the full suite with the smoke profile
  # every Monday at 02:00 UTC.
  schedule:
    - cron: '0 2 * * 1'

concurrency:
  group: load-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  load-test:
    name: k6 Load Test (${{ inputs.scenario || 'all' }} / ${{ inputs.profile || 'smoke' }})
    runs-on: ubuntu-latest

    permissions:
      contents: read

    services:
      # Spin up a lightweight PostgreSQL for the backend
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eudiplo
          POSTGRES_PASSWORD: eudiplo
          POSTGRES_DB: eudiplo
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      BASE_URL: http://localhost:3000
      TENANT_ID: demo
      CLIENT_ID: test-client
      CLIENT_SECRET: test-client-secret
      # Use the postgres service above
      DB_TYPE: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: eudiplo
      DB_PASSWORD: eudiplo
      DB_DATABASE: eudiplo

    steps:
      # -------------------------------------------------------------------
      # Checkout & toolchain
      # -------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # -------------------------------------------------------------------
      # Install k6
      # -------------------------------------------------------------------
      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      # -------------------------------------------------------------------
      # Build & start the backend
      # -------------------------------------------------------------------
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend
        run: pnpm --filter @eudiplo/backend build

      - name: Start backend
        run: |
          # Copy default demo config assets
          cp -r assets /tmp/eudiplo-assets
          pnpm --filter @eudiplo/backend start:prod &
          echo "BACKEND_PID=$!" >> "${GITHUB_ENV}"
        env:
          NODE_ENV: production
          PORT: 3000
          ASSETS_PATH: /tmp/eudiplo-assets
          TEST_CLIENT_SECRET: ${{ env.CLIENT_SECRET }}

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend on ${BASE_URL}..."
          for i in $(seq 1 30); do
            if curl -sf "${BASE_URL}/health" >/dev/null 2>&1; then
              echo "Backend is up after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: Backend did not become ready in 60s" >&2
          exit 1

      # -------------------------------------------------------------------
      # Run load tests
      # -------------------------------------------------------------------
      - name: Determine scenarios to run
        id: scenarios
        run: |
          scenario="${{ inputs.scenario || 'all' }}"
          if [[ "${scenario}" == "all" ]]; then
            echo "args=" >> "${GITHUB_OUTPUT}"
          else
            echo "args=${scenario}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Run k6 load tests
        run: |
          mkdir -p scripts/load-test/results
          bash scripts/load-test/run-all.sh ${{ steps.scenarios.outputs.args }}
        env:
          K6_PROFILE: ${{ inputs.profile || 'smoke' }}
          BASE_URL: ${{ env.BASE_URL }}
          TENANT_ID: ${{ env.TENANT_ID }}
          CLIENT_ID: ${{ env.CLIENT_ID }}
          CLIENT_SECRET: ${{ env.CLIENT_SECRET }}

      # -------------------------------------------------------------------
      # Upload results regardless of pass/fail
      # -------------------------------------------------------------------
      - name: Upload test summaries
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: k6-results-${{ github.run_id }}
          path: scripts/load-test/results/
          retention-days: 30

      # -------------------------------------------------------------------
      # Stop the backend
      # -------------------------------------------------------------------
      - name: Stop backend
        if: always()
        run: |
          if [[ -n "${BACKEND_PID:-}" ]]; then
            kill "${BACKEND_PID}" 2>/dev/null || true
          fi
