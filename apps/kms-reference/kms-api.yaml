openapi: "3.1.0"
info:
  title: KMS Reference API
  version: "1.0.0"
  description: |
    HTTP KMS microservice API contract consumed by the EUDIPLO backend's
    `HttpKmsAdapter`.

    ⚠️ **Development and testing only.** Keys are stored in memory and lost on
    every restart. Use a real KMS (HashiCorp Vault, AWS KMS, PKCS#11 HSM) for
    production workloads.

servers:
  - url: http://localhost:8788
    description: Local development (wrangler dev)

security:
  - apiKey: []
  - {}

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: x-api-key
      description: |
        Set `API_KEY` in `wrangler.jsonc` vars (or `.dev.vars`) to enable.
        Leave empty to run without authentication.

  schemas:
    PublicJwk:
      type: object
      description: Public key in JWK format (EC P-256).
      required: [kty, crv, x, y, kid, alg]
      properties:
        kty: { type: string, example: EC }
        crv: { type: string, example: P-256 }
        x:   { type: string, description: Base64URL-encoded x coordinate }
        y:   { type: string, description: Base64URL-encoded y coordinate }
        kid: { type: string, description: Key identifier }
        alg: { type: string, example: ES256 }

    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }

paths:
  /health:
    get:
      summary: Health check
      operationId: health
      security: []
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                required: [ok, keyCount]
                properties:
                  ok:       { type: boolean, example: true }
                  keyCount: { type: integer, description: Number of keys currently in memory }

  /keys:
    post:
      summary: Generate a key pair
      operationId: generateKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kid]
              properties:
                kid:
                  type: string
                  description: Desired key identifier.
                  example: my-signing-key
                alg:
                  type: string
                  description: Signing algorithm. Only `ES256` is supported.
                  default: ES256
                  example: ES256
      responses:
        "200":
          description: Key generated successfully.
          content:
            application/json:
              schema:
                type: object
                required: [publicJwk]
                properties:
                  publicJwk: { $ref: "#/components/schemas/PublicJwk" }
        "400":
          description: Bad request.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /keys/{kid}/sign:
    post:
      summary: Sign data
      operationId: signData
      parameters:
        - name: kid
          in: path
          required: true
          schema: { type: string }
          description: Key identifier to sign with.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: string
                  description: Base64-encoded bytes to sign.
                alg:
                  type: string
                  description: Signing algorithm (informational, only ES256 supported).
                  default: ES256
      responses:
        "200":
          description: Signature produced.
          content:
            application/json:
              schema:
                type: object
                required: [signature]
                properties:
                  signature:
                    type: string
                    description: |
                      Base64URL-encoded raw IEEE P1363 signature (64 bytes: r‖s).
        "400":
          description: Bad request.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Key not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /keys/{kid}/import:
    post:
      summary: Import a private key
      operationId: importKey
      parameters:
        - name: kid
          in: path
          required: true
          schema: { type: string }
          description: Key identifier to assign to the imported key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [privateJwk]
              properties:
                privateJwk:
                  type: object
                  description: Private key in JWK format (EC P-256, must include `d`).
                alg:
                  type: string
                  description: Signing algorithm.
                  default: ES256
      responses:
        "200":
          description: Key imported successfully.
          content:
            application/json:
              schema:
                type: object
                required: [publicJwk]
                properties:
                  publicJwk: { $ref: "#/components/schemas/PublicJwk" }
        "400":
          description: Bad request or invalid JWK.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /keys/{kid}:
    delete:
      summary: Delete a key
      operationId: deleteKey
      parameters:
        - name: kid
          in: path
          required: true
          schema: { type: string }
          description: Key identifier to delete.
      responses:
        "204":
          description: Key deleted (or did not exist).
